<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team-Anmeldung erfolgreich – Padel Club Freiburg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --lilac:#cea8f0; --ink:#1f1f1f; --ink-soft:#5c5c5c;
    --white:#ffffff; --grey:#f2f2f2; --lime:#c8f000; --petrol:#0f4c5c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--grey);
    font-family:'Inter',system-ui,sans-serif; color:var(--ink); padding:24px;
  }
  .card{
    background:#fff; border-radius:16px; padding:40px 36px; max-width:480px; text-align:center;
    box-shadow:0 16px 36px -16px rgba(31,31,31,.25);
  }
  .logo{height:76px; margin-bottom:22px;}
  h1{font-weight:900; font-size:25px; margin:0 0 14px;}
  p{line-height:1.6; color:var(--ink-soft); margin:0 0 10px;}
  a{color:var(--petrol); font-weight:600;}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="pcf-logo.png" alt="Padel Club Freiburg e.V.">
    <h1>Team-Anmeldung erfolgreich</h1>
    <p>Die Zahlung ist eingegangen, euer Team ist für die One Game Challenge am 25.07.2026 angemeldet.</p>
    <p>Eine Bestätigung mit allen Details geht an die E-Mail-Adresse der anmeldenden Person.</p>
    <p style="margin-top:22px;">Bis bald bei Blackforest Padel!</p>
  </div>
</body>
</html>
